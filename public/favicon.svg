<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Seed Signal: a pomegranate cracked open, its seeds glowing like a signal -->
  <rect width="64" height="64" rx="14" fill="#0a0910" />

  <!-- crown / calyx -->
  <path
    d="M28 15 L30 10 L32 14 L34 9 L36 15 Z"
    fill="#c14458"
    opacity="0.9"
  />

  <!-- pomegranate body, split down the middle -->
  <path
    d="M32 16
       C 22 16 16 25 16 35
       C 16 45 23 51 32 51
       C 41 51 48 45 48 35
       C 48 25 42 16 32 16 Z"
    fill="#7a1f30"
  />
  <path
    d="M32 16 C 26 16 21 22 19 30 L 32 51 Z"
    fill="#c14458"
    opacity="0.55"
  />

  <!-- the crack, hairline -->
  <path
    d="M32 17 L30 26 L33 33 L29 41 L32 50"
    fill="none"
    stroke="#0a0910"
    stroke-width="1.4"
    stroke-linecap="round"
    opacity="0.85"
  />

  <!-- seeds glowing through the crack, like a signal pulsing outward -->
  <circle cx="31" cy="24" r="1.6" fill="#d9a441" />
  <circle cx="34" cy="31" r="2.1" fill="#f0c169" />
  <circle cx="30" cy="38" r="1.6" fill="#d9a441" />
  <circle cx="33" cy="45" r="1.3" fill="#d9a441" opacity="0.85" />

  <!-- faint signal arcs radiating from the brightest seed -->
  <path
    d="M40 31 A 9 9 0 0 0 34 22.6"
    fill="none"
    stroke="#d9a441"
    stroke-width="1"
    stroke-linecap="round"
    opacity="0.35"
  />
  <path
    d="M43.5 31 A 12.5 12.5 0 0 0 33 18.7"
    fill="none"
    stroke="#d9a441"
    stroke-width="1"
    stroke-linecap="round"
    opacity="0.2"
  />
</svg>
